<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b9eff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c778dd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#282c33;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1d23;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer circle -->
  <circle cx="64" cy="64" r="62" fill="url(#grad2)" stroke="url(#grad1)" stroke-width="2"/>
  
  <!-- Inner circle -->
  <circle cx="64" cy="64" r="58" fill="none" stroke="url(#grad1)" stroke-width="1" opacity="0.5"/>
  
  <!-- Code bracket left -->
  <path d="M 40 45 L 32 64 L 40 83" stroke="url(#grad1)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Code bracket right -->
  <path d="M 88 45 L 96 64 L 88 83" stroke="url(#grad1)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Forward slash in center -->
  <line x1="58" y1="45" x2="70" y2="83" stroke="#c778dd" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Backslash in center -->
  <line x1="70" y1="45" x2="58" y2="83" stroke="#5b9eff" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Dots decoration -->
  <circle cx="50" cy="35" r="2" fill="#5b9eff" opacity="0.7"/>
  <circle cx="78" cy="35" r="2" fill="#c778dd" opacity="0.7"/>
  <circle cx="36" cy="64" r="1.5" fill="#5b9eff" opacity="0.5"/>
  <circle cx="92" cy="64" r="1.5" fill="#c778dd" opacity="0.5"/>
  
  <!-- Bottom accent line -->
  <line x1="45" y1="95" x2="83" y2="95" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
</svg>